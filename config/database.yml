default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: ru_connect_development
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>

test:
  <<: *default
  database: ru_connect_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: ru_connect_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: ru_connect_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: ru_connect_production_cable
    migrations_paths: db/cable_migrate
